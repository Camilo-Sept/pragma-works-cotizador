# Sprint 2.1 - Base de datos local para desarrollo
#
# Este archivo levanta PostgreSQL localmente para desarrollo.
# Producción NO usará este contenedor; producción usará una BD administrada
# como Railway PostgreSQL con credenciales guardadas fuera de GitHub.

services:
  postgres:
    image: postgres:16-alpine
    container_name: pragma-works-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pragma_works_cotizador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Puerto local para desarrollo. No exponer este puerto en producción.
      - "5432:5432"
    volumes:
      # Volumen nombrado para conservar datos aunque se apague el contenedor.
      - pragma_works_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pragma_works_cotizador"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pragma_works_postgres_data:
